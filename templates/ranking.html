<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Ranking</title>
    <style>
        body { font-family: Arial; }
        h1 { color: green; }
        table { margin: auto; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 8px; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>🏕️ Ranking</h1>
    <table>
        <tr>
            <th>Pontuação</th>
            <th>Equipe</th>
            <th>Posição</th>
        </tr>
        {% for item in ranking %}
            <tr>
                <td>{{ item.pontos }}</td>
                <td>{{ item.equipe }}</td>
                <td>{{ loop.index }}</td>
            </tr>
        {% endfor %}
    </table>
</body>
</html>
