<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Ranking</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { color: green; text-align: center; }
        table { margin: auto; border-collapse: collapse; width: 60%; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>🏕️ Ranking</h1>
    <table>
        <tr>
            <th>Pontuação</th>
            <th>Equipe</th>
            <th>Posição</th>
        </tr>
        {% for item in ranking %}
        <tr>
            <td>{{ item["pontos"] }}</td>
            <td>{{ item["equipe"] }}</td>
            <td>
                {% if loop.index <= medalhas|length %}
                    {{ medalhas[loop.index - 1] }}
                {% else %}
                    {{ loop.index }}
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
